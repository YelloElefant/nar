<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NAR Live Audio Levels</title>
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <main>
        <section class="panel">
            <div class="panel-head">
                <h2>NAR Timeline</h2>
                <div class="toolbar">
                    <div class="pill"><span class="dot" id="dot"></span><span id="connLabel">connecting</span></div>
                    <button id="jumpNow" type="button">jump to now</button>
                    <button id="reload" type="button">reload window</button>
                </div>
            </div>
            <div id="timeline">
                <div class="timeline-shell">
                    <canvas id="history" width="1000" height="260"></canvas>
                </div>
                <div class="meter-bar">
                    <div class="meter-fill" id="meterFill"></div>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Controls</h2>
                <div class="toolbar">
                    <button id="playSelection" type="button">play selection</button>
                    <button id="playLive" class="live-cta" type="button">Live</button>
                    <button id="exportRange" class="export-cta" type="button">export</button>
                    <input id="seconds" type="number" min="10" max="1800" step="10" value="120"
                        style="display: none;" />
                </div>
            </div>
            <audio id="a" controls preload="none"></audio>
        </section>

    </main>

    <script src="/script.js"></script>
</body>

</html>
